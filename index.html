<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
#barra-anuncios {
    position: fixed;
    top: 0;
    width: 100%;
    background: #111;
    color: #fff;
    overflow: hidden;
    white-space: nowrap;
    z-index: 9999;
    padding: 10px 0;
    font-size: 14px;
    cursor: pointer;
}

#conteudo-anuncios {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 25s linear infinite;
}

.anuncio {
    display: inline-block;
    margin-right: 40px;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<div id="barra-anuncios">
    <div id="conteudo-anuncios"></div>
</div>

<div id="noticias"></div>

<script>
// Embaralhar
function embaralhar(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

const barra = document.getElementById('barra-anuncios');
const conteudo = document.getElementById('conteudo-anuncios');

let pausado = false;

// Clique para pausar/continuar
barra.addEventListener('click', () => {
    pausado = !pausado;
    conteudo.style.animationPlayState = pausado ? 'paused' : 'running';
});

// Carregar JSON
fetch('anuncios.json')
.then(res => res.json())
.then(dados => {

    const anuncios = embaralhar(dados);
    const listaFinal = [...anuncios, ...anuncios];

    listaFinal.forEach(item => {
        const span = document.createElement('span');
        span.className = 'anuncio';
        span.textContent = `${item.nome} | ${item.telefone}`;
        conteudo.appendChild(span);
    });
})
.catch(err => console.error('Erro ao carregar JSON:', err));
</script>

</body>
</html>
