<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
#barra-anuncios {
    position: fixed;
    top: 0;
    width: 100%;
    background: #111;
    color: #fff;
    overflow: hidden;
    white-space: nowrap;
    z-index: 9999;
    padding: 10px 0;
    font-size: 14px;
    cursor: pointer;
}

#conteudo-anuncios {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 25s linear infinite;
}

.anuncio {
    display: inline-block;
    margin-right: 40px;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
</style>

<style>
#noticias {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    background: #fff;
    display: flex;
    flex-direction: column;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: none;
}

.card-content {
    padding: 15px;
    flex: 1;
}

.card h3 {
    font-size: 16px;
    margin-bottom: 10px;
}

.card p {
    font-size: 14px;
    color: #555;
}

.card a {
    display: block;
    text-align: center;
    background: #007BFF;
    color: #fff;
    padding: 10px;
    text-decoration: none;
    font-weight: bold;
}
</style>
    
</head>

<body>

<div id="barra-anuncios">
    <div id="conteudo-anuncios"></div>
</div>

<div id="noticias"></div>

<script>
// Embaralhar
function embaralhar(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

const barra = document.getElementById('barra-anuncios');
const conteudo = document.getElementById('conteudo-anuncios');

let pausado = false;

// Clique para pausar/continuar
barra.addEventListener('click', () => {
    pausado = !pausado;
    conteudo.style.animationPlayState = pausado ? 'paused' : 'running';
});

// Carregar JSON
fetch('anuncios.json')
.then(res => res.json())
.then(dados => {

    const anuncios = embaralhar(dados);
    const listaFinal = [...anuncios, ...anuncios];

    listaFinal.forEach(item => {
        const span = document.createElement('span');
        span.className = 'anuncio';
        span.textContent = `${item.nome} | ${item.telefone}`;
        conteudo.appendChild(span);
    });
})
.catch(err => console.error('Erro ao carregar JSON:', err));
</script>

<script>
// Limitar caracteres
function limitarTexto(texto, limite) {
    return texto.length > limite ? texto.substring(0, limite) + '...' : texto;
}

// RSS -> JSON usando API gratuita
const RSS_URL = "https://api.rss2json.com/v1/api.json?rss_url=https://g1.globo.com/rss/g1/ce/ceara/";

fetch(RSS_URL)
.then(res => res.json())
.then(data => {
    const container = document.getElementById('noticias');

    data.items.slice(0, 6).forEach(noticia => {

        const card = document.createElement('div');
        card.className = 'card';

        const imagem = noticia.thumbnail || 'https://via.placeholder.com/300x180';

        card.innerHTML = `
            <img src="${imagem}">
            <div class="card-content">
                <h3>${limitarTexto(noticia.title, 80)}</h3>
                <p>${limitarTexto(noticia.description.replace(/<[^>]+>/g, ''), 120)}</p>
            </div>
            <a href="${noticia.link}" target="_blank">Ver notícia</a>
        `;

        container.appendChild(card);
    });
});
</script>

</body>
</html>
